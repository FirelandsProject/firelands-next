# Firelands World Server Configuration

Network:
  BindAddress: "0.0.0.0"
  Port: 8085

# Interactive stdin on the world process (same commands as in-game: .help, etc.).
# Disabled automatically when stdout is not a TTY (e.g. Docker without -t).
Console:
  Enabled: true
  # Full-screen TUI (FTXUI): scrollable log + fixed bottom command bar. If false,
  # falls back to plain stdin (StyledPrompt applies there). TTY required.
  # Tip: set Log.StickyBanner to false while using TUI (both fight for the terminal).
  Tui: true
  # Reserved full-width command row (stdin mode only); NO_COLOR disables.
  StyledPrompt: true

# Persistent outbound TCP to auth (realm online / instant offline on crash).
# Must match authserver.yaml RealmLink.Token and realmlist id.
RealmLink:
  # Must match authserver.yaml RealmLink (Token + Port) and realmlist id.
  Enabled: true
  AuthHost: "127.0.0.1"
  AuthPort: 3725
  RealmId: 1
  Token: "7f60c01601f61a28210fbfd729313d98074443838bda1fe9ca18d4a7198e4330"

# Realm label for auth/realm link; not sent in name-query (chat shows plain name).
World:
  RealmName: "Firelands"

# Lua gameplay scripts (bootstrap.lua optional under this directory).
Scripting:
  ScriptsDirectory: "scripts/lua"

Database:
  User: "firelands"
  Password: "firelands"
  Auth:
    URI: "jdbc:mariadb://127.0.0.1:3306/firelands_auth"
  Characters:
    URI: "jdbc:mariadb://127.0.0.1:3306/firelands_characters"
  World:
    URI: "jdbc:mariadb://127.0.0.1:3306/firelands_world"

Log:
  Level: "Info"
  File: "logs/firelands-world.log"
  # true = fixed banner (ANSI scroll region); false = normal terminal scrollback
  StickyBanner: true

Motd:
  - "Welcome to Firelands WoW!"
  - "Enjoy your stay in the lands of Fire and Ice."

# Client DBC folder (4.3.4): copy/extract from game data (MPQ/patch).
# Used for Faction.dbc (reputation indices), CharStartOutfit.dbc (starter gear),
# and any future DBC-driven features. Paths are relative to the process cwd.
Data:
  DbcPath: "data/dbc"
